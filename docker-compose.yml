services:
  # API Gateway
  gateway.ocelot:
    build:
      context: .
      dockerfile: ./gateway.ocelot/Dockerfile
    ports:
      - "8000:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      identity.api:
        condition: service_started
      station.api:
        condition: service_started
      session.api:
        condition: service_started
      staff.api:
        condition: service_started
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - evcharging-network
    # Tối ưu resource
    mem_limit: 256m
    cpus: 0.5
    restart: unless-stopped
  #    healthcheck:
  #      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
  #      interval: 30s
  #      timeout: 10s
  #      retries: 3
  #      start_period: 40s

  # Microservices
  identity.api:
    build:
      context: .
      dockerfile: ./services/identity.api/Dockerfile
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=identity_db;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - evcharging-network
    # Tối ưu resource
    mem_limit: 256m
    cpus: 0.3
    restart: unless-stopped

  station.api:
    build:
      context: .
      dockerfile: ./services/station.api/Dockerfile
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=station_db;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - evcharging-network
    # Tối ưu resource
    mem_limit: 256m
    cpus: 0.3
    restart: unless-stopped

  session.api:
    build:
      context: .
      dockerfile: ./services/session.api/Dockerfile
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=session_db;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - evcharging-network
    # Tối ưu resource
    mem_limit: 256m
    cpus: 0.3
    restart: unless-stopped

  staff.api:
    build:
      context: .
      dockerfile: ./services/staff.api/Dockerfile
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=staff_db;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - evcharging-network
    # Tối ưu resource
    mem_limit: 256m
    cpus: 0.3
    restart: unless-stopped

  # PostgreSQL Database - One instance with multiple databases
  postgres:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
      - POSTGRES_INITDB_ARGS=--auth-host=md5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    networks:
      - evcharging-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - evcharging-network
    # Tối ưu resource
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics check_port_connectivity" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  evcharging-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
